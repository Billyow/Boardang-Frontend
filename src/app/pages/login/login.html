<div class="login-page">

  <!-- Left decorative panel -->
  <div class="left-panel">
    <div class="orbs">
      <div class="orb orb-1"></div>
      <div class="orb orb-2"></div>
      <div class="orb orb-3"></div>
    </div>

    <div class="grid-overlay"></div>

    <div class="left-content">
      <div class="brand">
        <div class="brand-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
            <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
          </svg>
        </div>
        <span class="brand-name">Boardang</span>
      </div>

      <div class="hero-text">
        <h2>Organize your work,<br><em>your way.</em></h2>
        <p>Boards, tasks, and goals — all in one place. Built for teams that move fast.</p>
      </div>

      <div class="features">
        <div class="feature-item">
          <div class="feature-dot"></div>
          <span>Drag-and-drop board management</span>
        </div>
        <div class="feature-item">
          <div class="feature-dot"></div>
          <span>Real-time collaboration</span>
        </div>
        <div class="feature-item">
          <div class="feature-dot"></div>
          <span>Goal tracking & milestones</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Right form panel -->
  <div class="right-panel">
    <div class="form-wrapper">
      <div class="form-header">
        <h2>Welcome back</h2>
        <p>Sign in to continue to your workspace</p>
      </div>

      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <div class="field">
          <label for="email">Email address</label>
          <div class="input-wrap">
            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
              <polyline points="22,6 12,13 2,6"/>
            </svg>
            <input id="email" type="email" formControlName="email" autocomplete="email" placeholder="you@example.com" />
          </div>
        </div>

        <div class="field">
          <label for="password">Password</label>
          <div class="input-wrap">
            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input id="password" type="password" formControlName="password" autocomplete="current-password" placeholder="••••••••" />
          </div>
        </div>

        <button type="submit" class="submit-btn" [disabled]="form.invalid">
          <span>Sign in</span>
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="5" y1="12" x2="19" y2="12"/>
            <polyline points="12 5 19 12 12 19"/>
          </svg>
        </button>
      </form>

      <p class="register-link">
        Don't have an account?
        <a [routerLink]="['/register']">Create one free</a>
      </p>
    </div>
  </div>

</div>
