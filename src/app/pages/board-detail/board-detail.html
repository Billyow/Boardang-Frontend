@if (loading()) {
  <div class="board-loading">
    <span class="loading-dot"></span>
    <span class="loading-dot"></span>
    <span class="loading-dot"></span>
  </div>
}

@if (error()) {
  <p class="board-state error" role="alert">{{ error() }}</p>
}

@if (board(); as b) {
  <div class="board-page">
    <div class="board-header">
      <h2 class="board-title">{{ b.title }}</h2>
      @if (b.description) {
        <p class="board-desc">{{ b.description }}</p>
      }
    </div>

    <div class="kanban-scroll">
      <div class="kanban-track">

        @for (col of b.columns; track col.id; let i = $index) {
          <app-kanban-column
            [column]="col"
            [boardId]="boardId"
            [colorIndex]="i"
            (taskAdded)="onTaskAdded($event)"
            (taskDrop)="onTaskDrop($event)"
            (colDrop)="onColDrop($event)"
          />
        }

        <div class="add-column-card" [class.expanded]="showCreateForm()">
          @if (!showCreateForm()) {
            <button class="add-col-trigger" (click)="onAddColumn()" type="button">
              <span class="add-icon">+</span>
              <span class="add-label">Add column</span>
            </button>
          } @else {
            <form class="create-form" [formGroup]="createForm" (ngSubmit)="onCreateColumn()">
              <input
                class="create-input"
                formControlName="title"
                placeholder="Column title"
                autocomplete="off"
                autofocus
              />
              <div class="create-actions">
                <button
                  class="btn-create"
                  type="submit"
                  [disabled]="createForm.invalid || creating()"
                >
                  {{ creating() ? 'Adding…' : 'Add' }}
                </button>
                <button class="btn-cancel" type="button" (click)="onCancelCreate()">Cancel</button>
              </div>
            </form>
          }
        </div>

      </div>
    </div>
  </div>
}
