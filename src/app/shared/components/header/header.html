<header class="app-header">
  <div class="header-left">
    <a routerLink="/boards" class="home-btn" title="Go to boards">
      <div class="logo-mark">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
          <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
        </svg>
      </div>
      <span class="logo-text">Boardang</span>
    </a>
  </div>

  <div class="header-right">
    <a href="https://github.com" target="_blank" rel="noopener noreferrer" class="help-btn" title="Help">
      <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/>
        <line x1="12" y1="17" x2="12.01" y2="17"/>
      </svg>
      <span>Help</span>
    </a>

    <div class="user-pill">
      <div class="user-avatar">{{ userName ? userName[0].toUpperCase() : '?' }}</div>
      <div class="user-details">
        <span class="user-name">{{ userName ?? 'User' }}</span>
        <span class="user-email">{{ userEmail ?? '' }}</span>
      </div>
    </div>

    <button class="logout-btn" (click)="logout()" title="Log out">
      <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
    </button>
  </div>
</header>
